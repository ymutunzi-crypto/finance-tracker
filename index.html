<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Skip to content link for accessibility (A grading requirement) -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <h1>My Finance Tracker</h1>
        <nav>
            <ul>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#add-record">Add Expense</a></li>
                <li><a href="#records-table">Records</a></li>
                <li><a href="#settings">Settings</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <!-- Dashboard Section -->
        <section id="dashboard">
            <h2>Dashboard</h2>
            <div class="stats-container">
                <p>Total Spent: <span id="total-spent">0.00</span></p>
                <p>Remaining Budget: <span id="remaining-budget" aria-live="polite">0.00</span></p>
            </div>
        </section>

        <!-- Add Expense Form -->
        <section id="add-record">
            <h2>Add New Expense</h2>
            <form id="expense-form">
                <label for="description">Description:</label>
                <input type="text" id="description" name="description" required>

                <label for="amount">Amount:</label>
                <input type="number" id="amount" name="amount" step="0.01" required>

                <label for="category">Category:</label>
                <select id="category" name="category" required>
                    <option value="">Select a category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Books">Books</option>
                    <option value="Other">Other</option>
                </select>

                <label for="date">Date:</label>
                <input type="date" id="date" name="date" required>

                <button type="submit">Save Expense</button>
            </form>
        </section>

        <!-- Records Table -->
        <section id="records-table">
            <h2>Expense Records</h2>
            <div class="search-bar">
                <label for="search">Search Expenses:</label>
                <input type="text" id="search" placeholder="Type to search...">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- JavaScript will automatically insert rows right here -->
                </tbody>
            </table>
        </section>

        <!-- Settings / Import Export -->
        <section id="settings">
            <h2>Data Management (JSON)</h2>
            <button id="export-btn">Export Data</button>
            <input type="file" id="import-file" accept=".json" style="display:inline-block; margin-left:10px;">
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
